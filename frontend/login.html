<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – SkillSwap</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 1rem 2rem;
      position: relative;
    }

    .auth-orb-1 {
      position: fixed; top: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,0.2), transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 0;
    }

    .auth-orb-2 {
      position: fixed; bottom: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,101,132,0.15), transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 0;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.5s ease forwards;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo .logo-mark {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      margin: 0 auto 1rem;
      box-shadow: 0 0 40px rgba(108,99,255,0.4);
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0;
    }

    .divider-text {
      position: relative;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 1.25rem 0;
    }

    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 30px);
      height: 1px;
      background: var(--border);
    }

    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      z-index: 10;
      transition: color 0.2s;
      background: none;
      border: none;
      padding: 0;
    }

    .password-toggle:hover { color: var(--text-primary); }

    .input-password-wrap { position: relative; }

    .demo-hint {
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="auth-orb-1"></div>
  <div class="auth-orb-2"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <span class="logo-icon"><i class="bi bi-arrow-left-right"></i></span>
        SkillSwap
      </a>
      <div class="ms-auto">
        <a href="/signup" class="btn btn-primary btn-sm">Create Account</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark"><i class="bi bi-arrow-left-right"></i></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue swapping skills</p>
      </div>

      <div class="demo-hint">
        <i class="bi bi-info-circle me-2" style="color:var(--primary)"></i>
        <strong>Demo:</strong> Create a new account or use your registered email &amp; password.
      </div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label d-flex justify-content-between">
            <span>Password</span>
          </label>
          <div class="input-password-wrap input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Your password" required />
            <button type="button" class="password-toggle" id="toggle-password">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-btn">
          <span id="login-btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
          <span id="login-spinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Signing in...
          </span>
        </button>
      </form>

      <div class="divider-text mt-4">or</div>

      <p class="text-center mb-0" style="color:var(--text-muted);font-size:0.9rem">
        New to SkillSwap?
        <a href="/signup" style="color:var(--primary);font-weight:600">Create account</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // If already logged in, redirect
    requireGuest();

    // Password toggle
    $('#toggle-password').on('click', function () {
      const $pw = $('#password');
      const $icon = $('#eye-icon');
      if ($pw.attr('type') === 'password') {
        $pw.attr('type', 'text');
        $icon.removeClass('bi-eye').addClass('bi-eye-slash');
      } else {
        $pw.attr('type', 'password');
        $icon.removeClass('bi-eye-slash').addClass('bi-eye');
      }
    });

    // Login form
    $('#login-form').on('submit', function (e) {
      e.preventDefault();
      const email = $('#email').val().trim();
      const password = $('#password').val();

      if (!email || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      $('#login-btn-text').addClass('d-none');
      $('#login-spinner').removeClass('d-none');
      $('#login-btn').prop('disabled', true);

      $.ajax({
        url: '/api/auth/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ email, password }),
        success: function (res) {
          showToast('Welcome back, ' + res.user.name + '! 🎉', 'success');
          setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
        },
        error: function (xhr) {
          const msg = xhr.responseJSON?.message || 'Login failed. Please try again.';
          showToast(msg, 'error');
          $('#login-btn-text').removeClass('d-none');
          $('#login-spinner').addClass('d-none');
          $('#login-btn').prop('disabled', false);
        }
      });
    });
  </script>
</body>
</html>
